name: Security Scan (Actions)
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6"

jobs:
  # ------------------------------------------------------------------
  # 1. Zizmor: GitHub Actions ワークフロー自体のセキュリティ検査
  # ------------------------------------------------------------------
  zizmor:
    name: Zizmor (Actions Security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          advanced-security: false
          annotations: true

  # ------------------------------------------------------------------
  # 2. React Doctor: セキュリティ，パフォーマンスの問題を検査
  # ------------------------------------------------------------------
  react-doctor:
    name: React Doctor (Security & Performance)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: millionco/react-doctor@7da4ce4e27cb5208ed52ad9d01cae32f96ac177f # main
        with:
          verbose: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

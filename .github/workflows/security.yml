name: Security Scan (Actions)
permissions:
  contents: read
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6"

jobs:
  # ------------------------------------------------------------------
  # 1. Zizmor: GitHub Actions ワークフロー自体のセキュリティ検査
  # ------------------------------------------------------------------
  zizmor:
    name: Zizmor (Actions Security)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          advanced-security: false
          annotations: true

  # ------------------------------------------------------------------
  # 2. React Doctor: セキュリティ，パフォーマンスの問題を検査
  # ------------------------------------------------------------------
  react-doctor:
    name: React Doctor (Security & Performance)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: millionco/react-doctor@6216430f93404489f6a56b4d0a7c196beb86623a # main
